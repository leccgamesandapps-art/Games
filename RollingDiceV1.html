<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    
    #dice {
      font-size: 48px;
      margin: 20px;
    }
    
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    
    button:hover {
      background-color: #3e8e41;
    }
    
    #stats {
      margin-top: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <h1>Dice Roller</h1>
  <p id="dice"></p>
  <button id="roll-button">Roll Dice</button>
  <select id="num-dice">
    <option value="1">1 Dice</option>
    <option value="2">2 Dice</option>
    <option value="3">3 Dice</option>
    <option value="4">4 Dice</option>
    <option value="5">5 Dice</option>
    <option value="6">6 Dice</option>
    <option value="7">7 Dice</option>
    <option value="8">8 Dice</option>
    <option value="9">9 Dice</option>
    <option value="10">10 Dice</option>
  </select>
  <p id="stats"></p>
  
  <script>
    document.getElementById('roll-button').addEventListener('click', function() {
      var numDice = parseInt(document.getElementById('num-dice').value);
      rollDice(numDice);
    });
    
    function rollDice(numDice) {
      var rolls = [];
      for (var i = 0; i < numDice; i++) {
        rolls.push(Math.floor(Math.random() * 6) + 1);
      }
      var total = rolls.reduce((a, b) => a + b, 0);
      var maxTotal = numDice * 6;
      document.getElementById('dice').innerText = rolls.join(', ');
      document.getElementById('stats').innerText = total + '/' + maxTotal;
    }
  </script>
</body>
</html>
