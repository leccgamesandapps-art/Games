<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
    }
    
    #result {
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }
    
    #player-score {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      font-size: 18px;
    }
    
    #bot-score {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      font-size: 18px;
    }
    
    #game-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    
    button:hover {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div id="player-score">
    <p>Me</p>
    <p>Total Win: 0</p>
    <p>Total Lose: 0</p>
    <p>Score: 0</p>
  </div>
  <div id="bot-score">
    <p>Bot</p>
    <p>Total Win: 0</p>
    <p>Total Lose: 0</p>
    <p>Score: 0</p>
  </div>
  <div id="game-container">
    <h1>Rock Paper Scissors</h1>
    <button id="rock-button">Rock</button>
    <button id="paper-button">Paper</button>
    <button id="scissors-button">Scissors</button>
    <p id="result"></p>
  </div>
  
  <script>
    var choices = ['Rock', 'Paper', 'Scissors'];
    var playerScore = 0;
    var botScore = 0;
    var playerTotalWin = 0;
    var botTotalWin = 0;
    var playerTotalLose = 0;
    var botTotalLose = 0;
    
    document.getElementById('rock-button').addEventListener('click', function() {
      playGame('Rock');
    });
    
    document.getElementById('paper-button').addEventListener('click', function() {
      playGame('Paper');
    });
    
    document.getElementById('scissors-button').addEventListener('click', function() {
      playGame('Scissors');
    });
    
    function playGame(playerChoice) {
      var computerChoice = choices[Math.floor(Math.random() * choices.length)];
      var result;
      
      if (playerChoice === computerChoice) {
        result = 'Draw!';
      } else if ((playerChoice === 'Rock' && computerChoice === 'Scissors') || (playerChoice === 'Paper' && computerChoice === 'Rock') || (playerChoice === 'Scissors' && computerChoice === 'Paper')) {
        result = 'You Win!';
        playerScore++;
        if (playerScore === 20) {
          playerTotalWin++;
          playerScore = 0;
          botScore = 0;
          botTotalLose++;
        }
      } else {
        result = 'You Lose!';
        botScore++;
        if (botScore === 20) {
          botTotalWin++;
          playerScore = 0;
          botScore = 0;
          playerTotalLose++;
        }
      }
      
      document.getElementById('result').innerText = `You chose ${playerChoice}, bot chose ${computerChoice}. ${result}`;
      document.getElementById('player-score').innerHTML = `<p>Me</p><p>Total Win: ${playerTotalWin}</p><p>Total Lose: ${playerTotalLose}</p><p>Score: ${playerScore}</p>`;
      document.getElementById('bot-score').innerHTML = `<p>Bot</p><p>Total Win: ${botTotalWin}</p><p>Total Lose: ${botTotalLose}</p><p>Score: ${botScore}</p>`;
    }
  </script>
</body>
</html>
